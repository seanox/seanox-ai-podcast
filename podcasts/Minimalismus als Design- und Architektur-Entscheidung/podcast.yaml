segments:
  - speaker: tom
    offset:
    text: |
      Willkommen zu unserem allerersten Podcast!

      Und Respekt an alle -- die das mehrmals im Monat schaffen.

      Es war mehr Arbeit als gedacht -- macht aber Spass :-)

      Wir sind:
    prompt:

  - speaker: cleo
    offset:
    text: Cleo
    prompt:

  - speaker: tom
    offset:
    text: |
      Und Tom :-)

      Worum es heute geht?
      
      Vor ein paar Wochen bekam ich von einem Kollegen einen Link zu einem Gewinnspiel.
      Bei dem 3 einhalb Zoll Disketten verlost werden.
      Das Projekt dahinter wird nämlich 25 Jahre alt.
      
      Schöner -- netter -- Gag :-)
      Bei der Diskette musste ich automatisch schmunzeln.
      Und ich habe mich tatsächlich gefragt, ob Windows 11 noch Diskettenlaufwerke unterstützt.
      
      Nebenbei: Ja, tut es.
  
      Jedenfalls die Diskette blieb hängen.
      Und beim Mittagessen erwähnte ich die Sache gegenüber meiner lieben Kollegin Cleo.
      
      Ich weiss gar nicht, ob Du noch mit Disketten zu tun hattest?
      
      Jedenfalls warst du ziemlich verwundert ... aber erzähl mal selbst :-)
    prompt:

  - speaker: cleo
    offset:
    text: |
      Ja -- die Diskette hat mich wirklich neugierig gemacht.
      
      Aber mehr: Wer kommt heutzutage noch auf die Idee, Disketten zu verlosen?
      
      Ich dachte an Retro-Software -- vielleicht ein altes Spiel.
      Warum sollte man Software sonst so lange pflegen?
      
      Jedenfalls -- die URL gehört zu einem Repository auf GitHub.
      Ein Projekt für eine experimentelle Server-Engine -- ein modularer Web-Server.
      
      Und damit hatte ich wirklich nicht gerechnet!

      Aber es wurde noch skurriler.
      Gleich Eingangs wird darauf hingewiesen, dass das Binary auf nur 30 Kilobyte begrenzt ist.
      Es wird zwar klar gestellt, dass es eine 25 Jahre alte Spassfrage ist -- Warum Web-Server so gross sind?
      
      Aber 30 Kilobyte?
      
      Für mich wollte das mit der Feature-Liste einfach nicht zusammenpassen.
      
      Das Repository macht einen sehr aufgeräumten Eindruck.
      Aus seinem Alter macht es kein Geheimnis.
      Maven oder Gradle?
      Findet man hier nicht.

      Die Quellen sind direkt zugänglich.
      Aber ... 8 Java-Dateien?
      Ich suchte weitere Packages -- Libraries -- Dependencies...
      Nur da war nichts :-)
      
      Die Server-Klasse stand ziemlich mittig und fiel mir vermutlich thematisch auf.
      Da musste ich einfach mal reinschauen...
      
      Der erste Eindruck.
      Ehrlich?
      Ich musste schmunzeln.
      Enumeration, Vector, Runable -- also so richtig schön aus den 2000ern.
      Also Java Version 1.4 oder 1.5.
      255 Zeilen -- viele Kommentare -- alles sehr überschaubar.
      
      Also... wirklich grosse Erwartungen hatte ich da nicht.
      
      Ja -- ein universeller ServerSocket der auch SSL kann...
      
      Aber dann wurde es interessanter.
      
      Ein sich selbst regulierender Worker-Pool -- mit Backlog -- in wenigen Zeilen -- ohne Abstraktion -- ohne moderne und externe Frameworks?
      
      Und die anderen Klassen?
      Service, Worker ... da sah es ähnlich aus.
      
      Da glaubte ich langsam zu verstehen, was das mit den 30 Kilobyte Limit und der Spassfrage auf sich hat.
      Radikaler Minimalismus als Design- und Architektur-Entscheidung.
    prompt:

  - speaker: tom
    offset:
    text: |
      Spannend!
      Constraints in der Softwareentwicklung waren lange Zeit ein echtes Thema.
      Heute ist das kaum noch relevant.
      Früher war das aber Argumentation für unkonventionelle Entscheidungen.
      Und eine treibende Kraft für effiziente Umsetzung.
    prompt:

  - speaker: cleo
    offset:
    text: |
      Ja :-)
      Unkonventionelles findet man in den Projekt viel :-)
      
      Template-Engine, Decoding -- Hier passiert viel auf Byte-Level.
      Es wird geschoben, manipuliert, mit Zeigern und Cursorn...
      Statt Byte-Arrays neu zu initialisieren -- wird oft direkt damit gearbeitet.
      
      Und solche kleinen Details findet man ganz viel.
      
      Auch das Lesen und Parsen -- alles beim ersten Durchlauf.
      Mehrfaches -- fragmentiertes Verarbeiten -- das wird bewusst vermieden. 
      
      Und das in Java?
      
      Für mich war das erstmal ungewohnt.

    prompt:

  - speaker: tom
    offset:
    text: |
      Ein bisschen wie in C :-)
      
      Und du erwähntest eigenes Decoding?
      
      Auch für UTF-8?
    prompt:

  - speaker: cleo
    offset:
    text: |
      Ja -- Auch UTF-8.
      
      :-) Dich macht das auch stutzig -- weil die VM es ja schon mitbringt?
      
      Die Antwort dazu ist simpel.
      Aber ehrlich gesagt -- ich musste mich da auch erst reindenken.
      
      Denn die Request-Verarbeitung soll bei fehlerhaftem Encoding nicht abbrechen.
      Sondern sauber bis zum Logging durchlaufen -- was die Methode der VM nicht kann.
    prompt:

  - speaker: tom
    offset:
    text: Und dann kam was -- wo ich weiss -- dass Du es nie gerne tust :-)
    prompt:

  - speaker: cleo
    offset:
    text: |
      Ja -- ich habe mir die Doku vorgenommen.
      
      Und Tom; Würdest Du die Beschreibung zum Format einer ini-Datei lesen?
      Also ich meine wirklich das Format -- nicht die Bedeutung der Sektionen und Schlüssel.
    prompt:

  - speaker: tom
    offset:
    text: Nein :-)
    prompt:

  - speaker: cleo
    offset:
    text: |
      Dachte ich mir :-)
      
      Die Doku fängt mit Installation und Konfiguration an.
      Alles in einer ini-Datei -- fein.
      
      Die Datei hatte ich zwar schon gesehen, aber nicht geöffnet.

      Und auch wenn in der Doku die Beispiele wie ini aussehen -- das ist keins!
      
      Mehrfachvererbung -- dynamische Werte -- Zugriff auf Umgebungsvariablen...
      
      Das ist eine Art Mini-DSL.
    prompt:

  - speaker: tom
    offset:
    text: Also eine kleine, spezialisierte Sprache nur für die Konfiguration?
    prompt:

  - speaker: cleo
    offset:
    text: |
      Genau :-)
      
      Aber zurück zu meiner Skepsis wegen der Feature-Liste.
      Und warum mich die Doku interessierte.

      Allein der Begriff Feature-Liste.
      Nur mal ein Auszug aus dem ersten Eintrag:
      
      Der eigene ClassLoader unterstützt das Laden und Entladen von Servern und Modulen zur Laufzeit.
      Darüber hinaus werden kaskadierte Konstruktoren für Server und Module unterstützt.
      
      Tom: Was sind kaskadierte Konstruktoren? :-P
    prompt:

  - speaker: tom
    offset:
    text: |
      Wenn du mich so fragst -- nicht das, was ich erwarten würde :-)
      
      Erzähl mal...
    prompt:

  - speaker: cleo
    offset:
    text: |
      Hot-Swap -- Über eigene ClassLoader kann man Module zur Laufzeit laden und entladen.
      Ich weiss, das kennst du.
      
      Und hier wurde das Prinzip erweitert.
      Später wird das in der Doku als Cascaded Components beschrieben.
      
      Also, statt Objekte über Vererbung zu verbinden -- was ja klassisch für Java ist.
      Werden die Objekte hier deklarativ gekoppelt.
      Die Vererbung wird quasi ausgesetzt.
    
      Und das ist spannend!
      
      Denn du kannst zur Laufzeit neue ClassLoader zwischen den Modulen einfügen und entfernen. 
      Das ist wie eine Art dynamischer Baukasten für Server und Module.
      Aber alles sehr minimalistisch.
      Was das sehr flexibel und mächtig machen muss.
    prompt:

  - speaker: tom
    offset:
    text: |
      Das erinnert mich stark an OSGi.
      Dieselbe Idee von modularen, dynamisch ladbaren Komponenten -- aber hier auf das Wesentliche reduziert.
      
      Ehrlich gesagt überrascht mich das nicht.
      Die Grundprinzipien dahinter gibt es seit den 70ern.
      
      Smalltalk-Images -- modulare Betriebssysteme -- austauschbare Komponenten zur Laufzeit.
      
      Java hat das später mit ClassLoadern formalisiert und OSGi hat es dann standardisiert.
      
      Aber das Konzept selbst -- ist viel älter.
      
      Vielleicht ein Thema für einen eigenen Podcast.
      Die Parallelen zwischen Smalltalk und Java sind spannender, als viele erwarten würden.
       
      Aber zurück zu deinen Zweifeln an der Feature-Liste.
    prompt:

  - speaker: cleo
    offset:
    text: |
      Kurz gesagt -- Es ist alles implementiert.
      Und in dem wenigen Code gibt es wirklich viele interessante Ansätze zu entdecken.
      
      Lass uns aber beim Minimalismus bleiben.
      
      Was mir aufgefallen ist: Das Vertrauen in die eigene Entwicklung und die reine Java-API.
      
      Wenn ich ehrlich bin -- vernachlässigen wir das heute.
      Delegieren unsere Verantwortung teils reflexartig in Pattern und Frameworks.
      Abstrahieren vermutlich zu schnell.
      Und ich muss gestehen; man kann sich an den Minimalismus und die Leichtigkeit gewöhnen.
      Ohne den radikalen Ansatz nachahmen zu wollen -- hat das für mich die reine Java-API wieder interessanter gemacht.
      Auch was die älteren Bestandteile betrifft.
      
      Vieles was wir heute als altmodisch betrachten, kann reale Probleme auf eine sehr elegante und leichtgewichtige Art lösen.
    prompt:

  - speaker: tom
    offset:
    text: Schöne Selbstreflexion :-)
    prompt:

  - speaker: cleo
    offset:
    text: |
      Was die Grösse vom Binary angeht -- war ich aber immer noch skeptisch.
      
      Das Release selbst war nämlich schon viermal so gross.
      
      Und nach dem Entpacken?
      Tatsächlich nur eine 30 Kilobyte Binary -- Start-Skripte -- Konfigurationsdatei und ein Keystore für Zertifikate -- Templates -- das wars.
                  
      Die Grösse kam einfach von der Dokumentation.
      Und selbst da: Minimalismus first -- alles in Markdown.
    
      Ach ja.
      Warum ich eingangs von radikalem Minimalismus gesprochen habe.
      Das "radikale" wurde mir eigentlich erst beim Build-Prozess klar.
      Dafür wird Apache Ant verwendet -- für die 2000er ein Quasi-Standard.
    
      Spannend ist aber ein Detail: Statt der üblichen Zip-Funktionalität aus Java,
      wird eine recht alte Seven-Zip-Implementierung genutzt,
      weil sie auffallend kleine Zip- und damit auch Jar-Dateien erzeugt.
    prompt:

  - speaker: tom
    offset:
    text: |
      So beachtenswert das auch alles ist -- für mich zeigt das auch ein bisschen die Schattenseite.
      Denn die Entwicklung mit Constraints:
      Ich hatte das zu Beginn auch als treibende Kraft für unkonventionelle Ansätze bezeichnet,
      das auch Innovationen sein können.
      Dem gegenüber steht aber ein hoher Aufwand,
      wenn das Projekt die Grenzen der Constraints erreicht.
      
      Scheinbar auch in diesem Projekt.
    
      Die Folge ist: Für jede Erweiterung -- sogar für jeden Bug-Fix muss erst Platz geschaffen werden.
      Folglich muss bei jedem Entwicklungszyklus die bisherige Lösung in Frage gestellt werden.
      Wie gesagt -- das kann innovativ sein.
      Kostet aber sehr viel Zeit und verlangt sehr viel Disziplin.
      
      Und Cleo: Auch wenn Du es bisher nicht erwähnt hast -- weiss ich -- da wir den Podcast ja zusammen entworfen haben -- dass das Projekt eine Testabdeckung von über 90% hat.
      Ich denke -- auch das ist ein Tribut für Constraints.
      
      Ohne Frage -- Minimalismus als Design- und Architektur-Entscheidung ist spannend und wirkliche Ingenieurskunst.
      Dennoch sollte der Ansatz heute vermutlich mehr zum Nachdenken als wie zum Nachmachen anregen.
      
      Ich glaube, wir könnten darüber noch lange weiterreden. 
      Aber für heute ist das vielleicht ein gutes Fazit.
      
      Was die Zuhörer aber noch interessieren wird:
      Hast Du eine Diskette bekommen?
    prompt:

  - speaker: cleo
    offset:
    text: |
      Nein.
      Ich habe bei dem Gewinnspiel nicht mitgemacht.
           
      Für mich war es eher eine spannende Entdeckungsreise in ein Projekt, das wie eine kleine Zeitkapsel wirkt.
      
      Und dafür einfach Danke an den Autor.
      
      Und euch danke fürs Zuhören.
    prompt:

  - speaker: tom
    offset:
    text: |
      Danke Cleo für die interessanten Einblicke.
      
      Ich denke, dieser Podcast war unser Anfang -- es wird weitere Folgen geben.
      Bleibt also gespannt!
    
      Danke und bis dahin: Tschüss!
    prompt:
